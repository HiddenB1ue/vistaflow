<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VistaFlow | 智能出行规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#030303',
                        starlight: '#F5F5F7',
                        dawn: '#E5C07B',
                        dusk: '#8B5CF6',
                        muted: '#8A8A8E'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                        serif: ['"Cormorant Garamond"', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500&display=swap');
        
        body { background-color: #030303; color: #F5F5F7; overflow-x: hidden; transition: background-color 1s; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        :root {
            --aura-color-1: #1a2a40;
            --aura-color-2: rgba(229, 192, 123, 0.15);
            --path-color: rgba(229, 192, 123, 0.3);
            --pulse-color: #E5C07B;
            --bg-color: #030303;
        }
        
        body.night-mode {
            --aura-color-1: #110e24;
            --aura-color-2: rgba(139, 92, 246, 0.15);
            --path-color: rgba(139, 92, 246, 0.3);
            --pulse-color: #8B5CF6;
        }

        .aura-container { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .aura { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1), background 2s ease; }
        .aura-1 { width: 70vw; height: 70vw; background: radial-gradient(circle, var(--aura-color-1) 0%, transparent 70%); top: -20%; left: -10%; }
        .aura-2 { width: 50vw; height: 50vw; background: radial-gradient(circle, var(--aura-color-2) 0%, transparent 70%); bottom: -10%; right: -10%; }

        .noise { position: fixed; inset: 0; z-index: 5; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        
        .nl-input { background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: var(--pulse-color); font-family: 'Space Grotesk', sans-serif; text-align: center; outline: none; transition: border-color 0.4s, width 0.4s, color 1s; width: 140px; font-size: 1.5rem; cursor: text; }
        .nl-input:focus { border-bottom-color: var(--pulse-color); width: 180px; }
        .nl-input.date-input { width: 160px; cursor: pointer; caret-color: transparent; }
        .nl-input.date-input:focus { width: 200px; }

        /* 卡片样式 */
        .ticket-card { background: transparent; border: 1px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.08); transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); padding: 2rem 1.5rem; margin-bottom: 1rem; border-radius: 12px; position: relative; }
        .ticket-card:hover { background: rgba(255,255,255,0.02); }
        .ticket-card.active { border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.03); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5); }
        .ticket-card::before { content: ''; position: absolute; left: -1px; top: 1.5rem; bottom: 1.5rem; width: 3px; background: var(--pulse-color); border-radius: 0 4px 4px 0; opacity: 0; transition: opacity 0.3s; }
        .ticket-card.active::before { opacity: 1; }

        .details-panel { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s; opacity: 0; }
        .ticket-card.active .details-panel { max-height: 2000px; opacity: 1; padding-top: 2rem; }

        /* 紧凑型经停面板 (防信息爆炸) */
        .stops-panel { max-height: 0; overflow-y: auto; transition: max-height 0.4s ease; opacity: 0; margin-top: 0; }
        .stops-panel.expanded { max-height: 160px; opacity: 1; margin-top: 1rem; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .stops-panel::-webkit-scrollbar { width: 4px; }
        .stops-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* 转场覆盖层 (结合v9带有文字和进度条的剧场级动画) */
        .transition-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh; 
            background: var(--bg-color); z-index: 9999; 
            transform: translateY(100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .loading-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            color: var(--pulse-color);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
        }

        #results-dashboard { opacity: 1; }

        /* 右侧列表区域粘性头部 */
        .sticky-header {
            position: sticky; top: 0; z-index: 40;
            padding-bottom: 1.5rem; margin-bottom: 1.5rem;
        }

        /* 地图样式 */
        .map-path { stroke-dasharray: 1000; stroke-dashoffset: 1000; transition: stroke-dashoffset 1.5s ease-in-out, stroke 1s; stroke: var(--path-color); stroke-width: 2; fill: none;}
        .map-idle-path { stroke: rgba(255,255,255,0.05); stroke-width: 1; fill: none; stroke-dasharray: 4 4; animation: dash 20s linear infinite; }
        .map-pulse { fill: var(--pulse-color); filter: drop-shadow(0 0 6px var(--pulse-color)); transition: fill 1s; }
        
        @keyframes dash { to { stroke-dashoffset: -100; } }

        /* 高级侧边栏 */
        #filter-drawer {
            position: fixed; top: 0; right: -500px; width: 460px; height: 100vh;
            background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255,255,255,0.08); z-index: 150;
            padding: 3rem; display: flex; flex-direction: column;
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #filter-drawer.open { right: 0; }

        .custom-toggle { position: relative; width: 44px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: background 0.3s; }
        .custom-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #F5F5F7; border-radius: 50%; transition: transform 0.3s; }
        .custom-toggle.active { background: var(--pulse-color); }
        .custom-toggle.active::after { transform: translateX(20px); background: #030303; }

        .time-theme-text { transition: color 1s; }
        body:not(.night-mode) .time-theme-text { color: #E5C07B; }
        body.night-mode .time-theme-text { color: #8B5CF6; }
        body:not(.night-mode) .time-theme-bg { background-color: #E5C07B; }
        body.night-mode .time-theme-bg { background-color: #8B5CF6; }
        body:not(.night-mode) .hover-time-theme:hover { background-color: #E5C07B; color: #030303; }
        body.night-mode .hover-time-theme:hover { background-color: #8B5CF6; color: #F5F5F7; }

        /* ===== 日历弹窗样式 ===== */
        .calendar-day { 
            position: relative; z-index: 1; transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            margin: auto; border-radius: 12px;
        }
        .calendar-day::before {
            content: ''; position: absolute; inset: 0; border-radius: 12px; z-index: -1;
            background: rgba(255, 255, 255, 0.08); transform: scale(0.8); opacity: 0;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .calendar-day:not(.empty):not(.active):hover::before { transform: scale(1); opacity: 1; }
        .calendar-day:not(.empty):not(.active):hover { color: #fff; }
        .calendar-day.active { color: #030303; font-weight: 500; }
        .calendar-day.active::before { background: var(--pulse-color); transform: scale(1); opacity: 1; box-shadow: 0 4px 15px var(--path-color); }
        .dp-ambient-glow { background: radial-gradient(circle at 50% 0%, var(--path-color) 0%, transparent 60%); transition: background 1s ease; }

        /* ===== 页面路由系统 ===== */
        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; }
        /* results page 需要 flex 布局，覆盖 display:block */
        #page-results.active { display: block; }
        #results-dashboard { display: flex; opacity: 1; }
    </style>
</head>
<body>
    
    <!-- ===== 全局背景层（跨页面保留）===== -->
    <div class="noise"></div>
    <div class="aura-container">
        <div class="aura aura-1" id="aura-1"></div>
        <div class="aura aura-2" id="aura-2"></div>
    </div>

    <!-- ===== 页面转场覆盖层 ===== -->
    <div class="transition-overlay" id="transition-overlay">
        <div class="loading-text" id="loading-text">环境感知中...</div>
        <div class="w-48 h-[1px] bg-white/10 mt-6 relative overflow-hidden hidden" id="loading-bar-container">
            <div class="absolute left-0 top-0 h-full w-1/3 time-theme-bg" id="loading-bar"></div>
        </div>
    </div>

    <!-- ===== 全局导航栏（跨页面保留）===== -->
    <nav class="fixed top-0 w-full p-8 md:p-12 flex justify-between items-center z-50 mix-blend-difference">
        <div class="font-display font-medium text-xl tracking-[0.3em] uppercase text-white cursor-pointer" onclick="navigateTo('page-home')">VistaFlow</div>
        <div class="flex items-center gap-8">
            <!-- 面包屑导航：仅在结果页显示 -->
            <div id="nav-breadcrumb" class="hidden items-center gap-3 text-xs font-display tracking-widest text-muted">
                <span class="cursor-pointer hover:text-white transition-colors" onclick="navigateTo('page-home')">首页</span>
                <span class="opacity-30">/</span>
                <span class="time-theme-text" id="nav-breadcrumb-label">出行方案</span>
            </div>
            <button class="text-sm font-display tracking-widest hover:text-white text-gray-400 transition-colors flex items-center gap-2 cursor-pointer" onclick="toggleFilterDrawer()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                出行偏好
            </button>
        </div>
    </nav>

    <!-- ============================================================ -->
    <!--  PAGE 1: 首页 / 搜索页                                        -->
    <!-- ============================================================ -->
    <div id="page-home" class="page active">

    <!-- 英雄区 (Hero) -->
    <section id="hero-section" class="relative h-screen flex flex-col items-center justify-center z-10 w-full px-6 overflow-hidden">
        <div id="hero-content" class="text-center w-full max-w-6xl">
            <h1 class="text-5xl md:text-7xl font-light tracking-widest mb-16 gs-reveal-up">
                <span class="font-serif italic text-muted text-4xl block mb-6" id="time-greeting">Plan your journey.</span>
                智能规划，<span class="font-serif italic time-theme-text">让出行更简单。</span>
            </h1>
            
            <div class="text-2xl md:text-3xl font-light tracking-wide flex flex-wrap justify-center items-center gap-y-8 gs-reveal-up leading-relaxed">
                <span class="text-muted">我想从</span>
                <input type="text" id="origin-input" value="北京" class="nl-input mx-4">
                <span class="text-muted">出发，前往</span>
                <input type="text" id="dest-input" value="上海" class="nl-input mx-4">
                <span class="text-muted">，</span>
                <span class="text-muted w-full md:w-auto mt-4 md:mt-0">日期是</span>
                <input type="text" id="date-input" class="nl-input date-input mx-4" readonly>
                <span class="text-muted">。</span>
            </div>

            <div class="mt-24 flex flex-col items-center gap-10 gs-reveal-up">
                <button id="flow-btn" class="group relative bg-starlight text-void rounded-full px-12 py-5 text-sm font-medium tracking-[0.2em] uppercase overflow-hidden cursor-pointer">
                    <span class="relative z-10 flex items-center gap-3">
                        生成出行方案
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </span>
                    <div class="absolute inset-0 time-theme-bg translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                </button>
            </div>
        </div>
    </section>

    </div><!-- /page-home -->

    <!-- ===== 日历弹窗 ===== -->
    <div id="date-picker-overlay" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/50 backdrop-blur-md opacity-0">
        <div id="date-picker-modal" class="relative overflow-hidden bg-[#0a0a0c]/80 border border-white/10 rounded-[2rem] shadow-[0_20px_60px_-10px_rgba(0,0,0,0.8)] transform scale-95 w-[420px] backdrop-blur-2xl">
            
            <div class="absolute inset-0 z-0 opacity-40 dp-ambient-glow pointer-events-none"></div>
            
            <div class="relative z-10 p-8">
                <div class="flex items-end justify-between mb-8 border-b border-white/10 pb-6">
                    <div>
                        <div class="text-[10px] text-muted font-display tracking-[0.3em] uppercase mb-2">Selected Date</div>
                        <div id="dp-display-date" class="font-serif italic text-4xl text-starlight transition-opacity duration-300">选择日期</div>
                    </div>
                    <div id="dp-display-year" class="font-display text-muted/60 text-xl font-light">2026</div>
                </div>

                <div class="flex justify-between items-center mb-6 px-1">
                    <button id="dp-prev" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 group cursor-pointer">
                        <svg class="w-4 h-4 text-muted group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div id="dp-month-year" class="font-display text-base tracking-[0.2em] text-starlight uppercase font-medium">3 月</div>
                    <button id="dp-next" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all duration-300 group cursor-pointer">
                        <svg class="w-4 h-4 text-muted group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="grid grid-cols-7 gap-2 text-center text-[10px] text-muted/60 mb-2 font-display tracking-[0.2em] uppercase">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>

                <div class="relative h-[240px] overflow-hidden" id="dp-grid-container">
                    <div id="dp-days" class="absolute w-full grid grid-cols-7 gap-y-2 gap-x-2 text-center font-display text-sm text-muted"></div>
                </div>

                <div class="mt-2 pt-6 border-t border-white/10 flex gap-3">
                    <button class="quick-btn flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-display tracking-widest text-muted hover:text-white transition-all border border-white/5 cursor-pointer" data-offset="0">今天</button>
                    <button class="quick-btn flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-display tracking-widest text-muted hover:text-white transition-all border border-white/5 cursor-pointer" data-offset="1">明天</button>
                    <button class="quick-btn flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-display tracking-widest text-muted hover:text-white transition-all border border-white/5 cursor-pointer" data-offset="7">下周</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!--  PAGE 2: 结果页 / 方案仪表盘                                   -->
    <!-- ============================================================ -->
    <div id="page-results" class="page">

    <!-- 偏好与设定侧边栏 -->
    <div id="filter-drawer" class="shadow-2xl">
        <div class="flex justify-between items-center mb-16">
            <div>
                <div class="text-xs time-theme-text font-display tracking-[0.3em] uppercase mb-2">Preferences</div>
                <h3 class="font-serif text-3xl italic text-starlight">出行偏好</h3>
            </div>
            <button class="text-muted hover:text-white p-2 cursor-pointer" onclick="toggleFilterDrawer()">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div class="space-y-12 flex-1 overflow-y-auto pr-4" style="scrollbar-width: none;">
            <div>
                <div class="text-sm text-starlight mb-6 flex items-center justify-between">
                    <span>仅看直达</span>
                    <div class="custom-toggle" onclick="this.classList.toggle('active')"></div>
                </div>
                <p class="text-xs text-muted leading-relaxed font-light">只显示无需换乘的直达车次。</p>
            </div>
            
            <div class="border-t border-white/10 pt-10">
                <div class="text-xs text-muted tracking-widest uppercase mb-6">座位偏好</div>
                <div class="space-y-6 text-sm text-starlight">
                    <div class="flex items-center justify-between">
                        <span>商务座 / 特等座</span>
                        <div class="custom-toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span>一等座</span>
                        <div class="custom-toggle active" onclick="this.classList.toggle('active')"></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span>二等座</span>
                        <div class="custom-toggle" onclick="this.classList.toggle('active')"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pt-8 border-t border-white/10 mt-auto">
            <button class="w-full bg-starlight text-void py-5 rounded-lg text-sm font-medium tracking-[0.2em] uppercase hover-time-theme transition-colors cursor-pointer" onclick="toggleFilterDrawer()">
                保存设置
            </button>
        </div>
    </div>

    <!-- 结果仪表盘 -->
    <section id="results-dashboard" class="fixed inset-0 z-40 pt-32 pb-10 px-8 lg:px-20 flex flex-col lg:flex-row gap-12">
        
        <!-- 左侧：地图脉冲 -->
        <div class="hidden lg:flex w-4/12 h-full flex-col justify-between border-r border-white/10 pr-10">
            <div>
                <div class="text-xs time-theme-text font-display tracking-[0.3em] uppercase mb-4 opacity-80">Route Map</div>
                <h2 class="font-serif text-5xl italic font-light text-starlight mb-2" id="route-display-title">北京 到 上海</h2>
                <div class="text-sm text-muted" id="map-status-text">未选择具体方案，全览模式。</div>
            </div>
            
            <div class="flex-1 flex items-center justify-center py-10 relative">
                <svg class="w-full h-full max-h-[500px]" viewBox="0 0 200 400" id="map-svg"></svg>
            </div>

            <div class="text-xs text-muted font-light tracking-widest uppercase flex items-center gap-3">
                <div class="w-1.5 h-1.5 time-theme-bg rounded-full animate-pulse" id="map-indicator"></div> 
                <span id="map-footer-text">AI 宏观拓扑预演</span>
            </div>
        </div>

        <!-- 右侧：详尽数据列表 -->
        <div class="w-full lg:w-8/12 h-full flex flex-col pl-2 relative">
            <div class="sticky-header flex justify-between items-end border-b border-white/10 shrink-0">
                <div class="text-lg font-serif italic text-starlight" id="result-date-title">3月25日 出行方案</div>
                <div class="flex gap-8 text-sm font-display tracking-[0.1em] uppercase text-muted">
                    <button class="time-theme-text font-medium cursor-pointer">智能推荐</button>
                    <button class="hover:text-starlight transition-colors cursor-pointer">耗时最短</button>
                    <button class="hover:text-starlight transition-colors cursor-pointer">价格最低</button>
                </div>
            </div>

            <div id="route-list" class="flex-1 overflow-y-auto pb-32 scroll-smooth pr-4" style="scrollbar-width: none;">
                <!-- 动态数据渲染 -->
            </div>
        </div>
    </section>

    </div><!-- /page-results -->

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ===================================================
        // 日历日期选择器
        // ===================================================
        let today = new Date();
        today.setHours(0, 0, 0, 0);

        let pickerDate = new Date(today);
        let selectedDate = new Date(today);

        const dateInput = document.getElementById('date-input');
        const dpOverlay = document.getElementById('date-picker-overlay');
        const dpModal = document.getElementById('date-picker-modal');
        const dpDays = document.getElementById('dp-days');
        const dpMonthYear = document.getElementById('dp-month-year');
        const dpDisplayDate = document.getElementById('dp-display-date');
        const dpDisplayYear = document.getElementById('dp-display-year');

        function updateDisplayHeaders() {
            const label = `${selectedDate.getMonth() + 1}月${selectedDate.getDate()}日`;
            dateInput.value = label;
            dpDisplayDate.innerText = label;
            dpDisplayYear.innerText = selectedDate.getFullYear();
        }
        updateDisplayHeaders();

        function renderCalendar(direction = 0) {
            const year = pickerDate.getFullYear();
            const month = pickerDate.getMonth();
            dpMonthYear.innerText = `${month + 1} 月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let newHtml = '';
            for (let i = 0; i < firstDay; i++) {
                newHtml += `<div class="calendar-day empty"></div>`;
            }
            for (let i = 1; i <= daysInMonth; i++) {
                const isSelected = selectedDate.getDate() === i && selectedDate.getMonth() === month && selectedDate.getFullYear() === year;
                const loopDate = new Date(year, month, i);
                const isPast = loopDate < today;
                const classes = `calendar-day cursor-pointer ${isSelected ? 'active' : ''} ${isPast && !isSelected ? 'opacity-30 hover:opacity-100' : ''}`;
                newHtml += `<div class="${classes}" onclick="selectDate(${year}, ${month}, ${i})">${i}</div>`;
            }

            if (direction === 0) {
                dpDays.innerHTML = newHtml;
            } else {
                const outX = direction === 1 ? -30 : 30;
                const inX = direction === 1 ? 30 : -30;
                gsap.to(dpDays, {
                    opacity: 0, x: outX, duration: 0.2, ease: "power2.in",
                    onComplete: () => {
                        dpDays.innerHTML = newHtml;
                        gsap.fromTo(dpDays, { opacity: 0, x: inX }, { opacity: 1, x: 0, duration: 0.3, ease: "power2.out" });
                    }
                });
            }
        }

        function selectDate(year, month, day) {

        const listContainer = document.getElementById('route-list');
        function renderRoutes() {
            listContainer.innerHTML = '';

                            document.getElementById('map-footer-text').innerText = "AI 宏观拓扑预演";

        // --- 动态地图生成 (选中方案) ---
        function drawFlowMap(index) {
            const svg = document.getElementById('map-svg');
            svg.innerHTML = '';
            const rt = routes[index];
            
            let nodesCount = 2;
            if(!rt.isDirect) {
                const transfers = rt.segs.filter(s => s.transfer).length;
                nodesCount = 2 + transfers;
            }
            
            let pathD = "M 100 20 ";
            for(let i=0; i<nodesCount; i++) {
                const y = 20 + i * (460/(nodesCount-1));
                const x = 100 + (Math.sin(i * 1.8) * 30);
                if(i > 0) {
                    const prevY = 20 + (i-1) * (460/(nodesCount-1));
                    const prevX = 100 + (Math.sin((i-1) * 1.8) * 30);
                    pathD += `C ${prevX} ${prevY + 50}, ${x} ${y - 50}, ${x} ${y} `;
                }
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", x); circle.setAttribute("cy", y); circle.setAttribute("r", 4);
                circle.setAttribute("class", "map-pulse");
                svg.appendChild(circle);
            }

            const pathNode = document.createElementNS("http://www.w3.org/2000/svg", "path");
            pathNode.setAttribute("d", pathD);
            pathNode.setAttribute("class", "map-path");
            svg.prepend(pathNode);

            setTimeout(() => { pathNode.style.strokeDashoffset = "0"; }, 50);
        }

        // --- 闲置全局概览地图生成 (未选中状态) ---
        function drawIdleMap() {
            const svg = document.getElementById('map-svg');
            svg.innerHTML = '';
            
            for(let j=0; j<4; j++) {
                let pathD = "M 100 20 ";
                const offset = (j - 1.5) * 15; 
                
                for(let i=0; i<3; i++) {
                    const y = 20 + i * 230;
                    const x = 100 + offset + (Math.sin(i * 2 + j) * 40);
                    if(i > 0) {
                        const prevY = 20 + (i-1) * 230;
                        const prevX = 100 + offset + (Math.sin((i-1) * 2 + j) * 40);
                        pathD += `C ${prevX} ${prevY + 50}, ${x} ${y - 50}, ${x} ${y} `;
                    }
                }
                
                const pathNode = document.createElementNS("http://www.w3.org/2000/svg", "path");
                pathNode.setAttribute("d", pathD);
                pathNode.setAttribute("class", "map-idle-path");
                svg.appendChild(pathNode);
            }
            
            const startDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            startDot.setAttribute("cx", 100); startDot.setAttribute("cy", 20); startDot.setAttribute("r", 3);
            startDot.setAttribute("fill", "rgba(255,255,255,0.2)");
            svg.appendChild(startDot);

            const endDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            endDot.setAttribute("cx", 100); endDot.setAttribute("cy", 480); endDot.setAttribute("r", 3);
            endDot.setAttribute("fill", "rgba(255,255,255,0.2)");
            svg.appendChild(endDot);
        }
    </script>
