openapi: 3.1.0
info:
  title: VistaFlow Task Module Refactor Compatibility Contract
  version: 1.0.0
  description: >-
    Compatibility contract for the task module refactor. The feature restructures
    internal task registration and execution wiring while preserving the existing
    admin task API surface and persisted task/run semantics.
paths:
  /task-types:
    get:
      summary: List supported task types from the unified registry
      responses:
        '200':
          description: Task type catalog remains available through the existing endpoint
        '401':
          description: Authentication failed
        '503':
          description: Admin service not ready
  /tasks:
    get:
      summary: List task definitions without requiring task data migration
      responses:
        '200':
          description: Task definition list
    post:
      summary: Create a task definition using task-type-owned payload validation
      responses:
        '201':
          description: Task created
        '400':
          description: Task payload invalid for the selected task type
        '409':
          description: Duplicate task name or unsupported execution capability
  /tasks/{taskId}:
    patch:
      summary: Update a task definition using the same task-type-owned payload normalization
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task updated
        '404':
          description: Task not found
        '409':
          description: Task currently running or update conflicts with task capabilities
  /tasks/{taskId}/run:
    post:
      summary: Trigger a manual run for an executable task type from the unified registry
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: integer
      responses:
        '202':
          description: Run accepted
        '404':
          description: Task not found
        '409':
          description: Task disabled, already running, or not executable
  /task-runs/{runId}:
    get:
      summary: Read a task run using the unchanged runtime outcome shape
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Run detail
        '404':
          description: Run not found
  /task-runs/{runId}/logs:
    get:
      summary: Read run logs written through the refactored task lifecycle
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Run log list
        '404':
          description: Run not found
  /task-runs/{runId}/terminate:
    post:
      summary: Terminate a running task when the task type declares termination support
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: integer
      responses:
        '202':
          description: Termination accepted
        '404':
          description: Run not found
        '409':
          description: Run cannot be terminated or task type does not support termination
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    TaskTypeCompatibilityNote:
      type: object
      required: [type, label, description, implemented, supportsCron, paramSchema]
      properties:
        type:
          type: string
        label:
          type: string
        description:
          type: string
        implemented:
          type: boolean
        supportsCron:
          type: boolean
        paramSchema:
          type: array
          items:
            type: object
    TaskRunCompatibilityNote:
      type: object
      required: [id, taskId, taskType, status, metricsValue, createdAt, updatedAt]
      properties:
        id:
          type: integer
        taskId:
          type: integer
        taskType:
          type: string
        status:
          type: string
        summary:
          type:
            - string
            - 'null'
        metricsValue:
          type: string
        progressSnapshot:
          type:
            - object
            - 'null'
        errorMessage:
          type:
            - string
            - 'null'
        terminationReason:
          type:
            - string
            - 'null'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
security:
  - bearerAuth: []
